function b64ToBytes(s){var b=atob(s),a=new Uint8Array(b.length);for(var i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return a;}
async function deriveKey(pw){
  var base = await crypto.subtle.importKey("raw", new TextEncoder().encode(pw), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    {name:"PBKDF2", salt:b64ToBytes(SALT), iterations:ITER, hash:"SHA-256"},
    base, {name:"AES-CBC", length:256}, false, ["decrypt"]);

async function decrypt(pw){

async function attempt(pw, fromCache){

    reveal(html);

    document.getElementById("pw").value = "";

}
document.getElementById("f").addEventListener("submit", function(ev){
